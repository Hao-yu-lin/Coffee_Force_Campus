<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Force Campus — Unit Test Runner</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', monospace, sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 20px; }
        h1   { color: #cba6f7; text-align: center; padding: 16px 0 8px; font-size: 1.4em; }
        p.subtitle { text-align: center; color: #a6adc8; font-size: 0.88em; margin-bottom: 24px; }

        #summary {
            max-width: 720px;
            margin: 0 auto 20px;
            background: #313244;
            border-radius: 10px;
            padding: 16px 20px;
            font-size: 1em;
        }
        #summary .stat { display: inline-block; padding: 4px 14px; border-radius: 6px; margin: 4px 6px; font-weight: 700; }
        .stat-pass  { background: #a6e3a1; color: #1e1e2e; }
        .stat-fail  { background: #f38ba8; color: #1e1e2e; }
        .stat-total { background: #89b4fa; color: #1e1e2e; }

        #results { max-width: 720px; margin: 0 auto; }

        .suite-block { background: #313244; border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
        .suite-header {
            padding: 10px 16px; font-weight: 700; font-size: 0.95em;
            background: #45475a; color: #cba6f7;
            display: flex; justify-content: space-between; align-items: center;
        }
        .suite-tests { padding: 8px 16px 12px; }

        .test-row {
            padding: 6px 8px; border-radius: 5px; margin: 4px 0;
            font-size: 0.88em; display: flex; align-items: flex-start; gap: 8px;
        }
        .test-pass  { background: rgba(166,227,161,0.1); color: #a6e3a1; }
        .test-fail  { background: rgba(243,139,168,0.15); color: #f38ba8; }
        .test-icon  { flex-shrink: 0; }
        .test-name  { flex: 1; }
        .test-error { color: #fab387; font-size: 0.82em; margin-top: 3px; }

        .badge { font-size: 0.78em; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
        .badge-pass { background: #a6e3a1; color: #1e1e2e; }
        .badge-fail { background: #f38ba8; color: #1e1e2e; }
    </style>
</head>
<body>
    <h1>☕ Coffee Force Campus</h1>
    <p class="subtitle">Unit Test Runner — utils.js pure functions</p>
    <div id="summary"></div>
    <div id="results"></div>

    <!-- 1. App constants (must load before utils) -->
    <script src="../js/constants.js"></script>
    <script src="../js/utils.js"></script>

    <!-- 2. Test framework (must load BEFORE unit.test.js) -->
    <script>
    /* ═══════════════════════════════════════════════
       Mini Test Framework
    ═══════════════════════════════════════════════ */
    const __suites  = [];
    const __results = [];
    let   __currentSuite = null;

    window.describe = function(name, fn) {
        __currentSuite = { name, tests: [] };
        __suites.push(__currentSuite);
        fn();
        __currentSuite = null;
    };

    window.test = function(name, fn) {
        let pass = true, error = null;
        try { fn(); }
        catch(e) { pass = false; error = e.message; }
        const row = { name, pass, error };
        if (__currentSuite) __currentSuite.tests.push(row);
        __results.push(row);
    };

    window.expect = function(actual) {
        return {
            toBe(expected) {
                if (actual !== expected)
                    throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
            },
            toEqual(expected) {
                const a = JSON.stringify(actual), b = JSON.stringify(expected);
                if (a !== b) throw new Error(`Expected ${b}, got ${a}`);
            },
            toBeNull() {
                if (actual !== null) throw new Error(`Expected null, got ${JSON.stringify(actual)}`);
            },
            toContain(item) {
                if (!actual.includes(item))
                    throw new Error(`Expected to contain ${JSON.stringify(item)}`);
            },
            toHaveLength(len) {
                if ((actual || []).length !== len)
                    throw new Error(`Expected length ${len}, got ${(actual||[]).length}`);
            },
            toBeGreaterThan(n) {
                if (actual <= n) throw new Error(`Expected ${actual} > ${n}`);
            },
            toBeCloseTo(expected, digits = 2) {
                const factor = Math.pow(10, digits);
                if (Math.round(actual * factor) !== Math.round(expected * factor))
                    throw new Error(`Expected ~${expected}, got ${actual}`);
            },
            toBeTruthy() {
                if (!actual) throw new Error(`Expected truthy, got ${JSON.stringify(actual)}`);
            },
            toBeFalsy() {
                if (actual) throw new Error(`Expected falsy, got ${JSON.stringify(actual)}`);
            }
        };
    };
    </script>

    <!-- 3. Test suite (uses framework defined above) -->
    <script src="unit.test.js"></script>

    <!-- 4. Render results after all tests ran -->
    <script>
    (function render() {
        const pass  = __results.filter(r => r.pass).length;
        const fail  = __results.filter(r => !r.pass).length;
        const total = __results.length;

        // Summary bar
        document.getElementById('summary').innerHTML = `
            <span class="stat stat-pass">✅ ${pass} passed</span>
            <span class="stat stat-fail">❌ ${fail} failed</span>
            <span class="stat stat-total">📊 ${total} total</span>
        `;

        // Suite blocks
        const resEl = document.getElementById('results');
        resEl.innerHTML = '';
        __suites.forEach(suite => {
            const passC = suite.tests.filter(t => t.pass).length;
            const failC = suite.tests.filter(t => !t.pass).length;

            const block = document.createElement('div');
            block.className = 'suite-block';

            block.innerHTML = `
                <div class="suite-header">
                    <span>📦 ${suite.name}</span>
                    <span>
                        <span class="badge badge-pass">${passC} ✅</span>
                        ${failC > 0 ? `<span class="badge badge-fail">${failC} ❌</span>` : ''}
                    </span>
                </div>
                <div class="suite-tests">
                    ${suite.tests.map(t => `
                        <div class="test-row ${t.pass ? 'test-pass' : 'test-fail'}">
                            <span class="test-icon">${t.pass ? '✅' : '❌'}</span>
                            <div class="test-name">
                                ${t.name}
                                ${t.error ? `<div class="test-error">→ ${t.error}</div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            resEl.appendChild(block);
        });

        // Also log to console
        console.log(`\nTest Results: ${pass} passed, ${fail} failed, ${total} total`);
        if (fail > 0) {
            __results.filter(r => !r.pass).forEach(r => console.error(`❌ ${r.name}: ${r.error}`));
        }
    })();
    </script>
</body>
</html>
