<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Force Campus — Unit Test Runner</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', monospace, sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 20px; }
        h1   { color: #cba6f7; text-align: center; padding: 16px 0 8px; font-size: 1.4em; }
        p.subtitle { text-align: center; color: #a6adc8; font-size: 0.88em; margin-bottom: 24px; }

        #summary {
            max-width: 700px;
            margin: 0 auto 20px;
            background: #313244;
            border-radius: 10px;
            padding: 16px 20px;
            font-size: 1em;
        }
        #summary .stat { display: inline-block; padding: 4px 14px; border-radius: 6px; margin: 4px 6px; font-weight: 700; }
        .stat-pass { background: #a6e3a1; color: #1e1e2e; }
        .stat-fail { background: #f38ba8; color: #1e1e2e; }
        .stat-total{ background: #89b4fa; color: #1e1e2e; }

        #results {
            max-width: 700px;
            margin: 0 auto;
        }

        .suite-block {
            background: #313244;
            border-radius: 10px;
            margin-bottom: 14px;
            overflow: hidden;
        }
        .suite-header {
            padding: 10px 16px;
            font-weight: 700;
            font-size: 0.95em;
            background: #45475a;
            color: #cba6f7;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .suite-tests { padding: 8px 16px 12px; }

        .test-row {
            padding: 6px 8px;
            border-radius: 5px;
            margin: 4px 0;
            font-size: 0.88em;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .test-pass { background: rgba(166,227,161,0.1); color: #a6e3a1; }
        .test-fail { background: rgba(243,139,168,0.15); color: #f38ba8; }
        .test-icon { flex-shrink: 0; font-size: 1em; }
        .test-name { flex: 1; }
        .test-error { color: #fab387; font-size: 0.82em; margin-top: 3px; }

        .run-btn {
            display: block;
            margin: 0 auto 20px;
            padding: 10px 32px;
            background: #cba6f7;
            color: #1e1e2e;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s;
        }
        .run-btn:hover { background: #b39ddb; }

        .badge { font-size: 0.78em; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
        .badge-pass { background: #a6e3a1; color: #1e1e2e; }
        .badge-fail { background: #f38ba8; color: #1e1e2e; }
    </style>
</head>
<body>
    <h1>☕ Coffee Force Campus</h1>
    <p class="subtitle">Unit Test Runner — utils.js pure functions</p>

    <button class="run-btn" onclick="runTests()">▶ Run Tests</button>

    <div id="summary" style="display:none;"></div>
    <div id="results"></div>

    <!-- Dependencies: constants.js first (DATASET_COLORS needed by utils.js) -->
    <script src="../js/constants.js"></script>
    <script src="../js/utils.js"></script>

    <!-- Test suite -->
    <script src="unit.test.js"></script>

    <script>
        function runTests() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('summary').style.display = 'none';

            // Collect console groups as suites
            const suites = {};
            let currentSuite = '__top__';

            const origGroup = console.group.bind(console);
            const origGroupEnd = console.groupEnd.bind(console);
            const origLog = console.log.bind(console);
            const origError = console.error.bind(console);

            // Re-run tests capturing output
            // Instead, we rely on the results array populated by unit.test.js
            // Re-execute by reloading the script dynamically

            // Since unit.test.js already ran on load, use window.__testSummary
            const summary = window.__testSummary();

            // Re-render from results array
            renderResults(window.__suiteResults || [], summary);
        }

        // We intercept describe/test to capture suite structure
        const __suites = [];
        let __currentSuite = null;

        // Override describe/test before unit.test.js runs
        const _describe = window.describe;
        const _test      = window.test;

        window.describe = function(name, fn) {
            __currentSuite = { name, tests: [] };
            __suites.push(__currentSuite);
            fn();
            __currentSuite = null;
        };

        window.test = function(name, fn) {
            let pass = true, error = null;
            try { fn(); }
            catch(e) { pass = false; error = e.message; }
            const row = { name, pass, error };
            if (__currentSuite) __currentSuite.tests.push(row);
            // also push to global results
            results.push({ pass, name, error });
            if (pass) console.log(`  ✅ ${name}`);
            else      console.error(`  ❌ ${name}: ${error}`);
        };

        window.__suiteResults = __suites;

        function renderResults(suites, summary) {
            const sumEl = document.getElementById('summary');
            sumEl.style.display = 'block';
            sumEl.innerHTML = `
                <span class="stat stat-pass">✅ ${summary.pass} passed</span>
                <span class="stat stat-fail">❌ ${summary.fail} failed</span>
                <span class="stat stat-total">📊 ${summary.total} total</span>
            `;

            const resEl = document.getElementById('results');
            resEl.innerHTML = '';

            suites.forEach(suite => {
                const passCount = suite.tests.filter(t => t.pass).length;
                const failCount = suite.tests.filter(t => !t.pass).length;
                const block = document.createElement('div');
                block.className = 'suite-block';
                const header = document.createElement('div');
                header.className = 'suite-header';
                header.innerHTML = `
                    <span>📦 ${suite.name}</span>
                    <span>
                        <span class="badge badge-pass">${passCount} ✅</span>
                        ${failCount > 0 ? `<span class="badge badge-fail">${failCount} ❌</span>` : ''}
                    </span>
                `;
                const body = document.createElement('div');
                body.className = 'suite-tests';
                suite.tests.forEach(t => {
                    const row = document.createElement('div');
                    row.className = `test-row ${t.pass ? 'test-pass' : 'test-fail'}`;
                    row.innerHTML = `
                        <span class="test-icon">${t.pass ? '✅' : '❌'}</span>
                        <div class="test-name">
                            ${t.name}
                            ${t.error ? `<div class="test-error">→ ${t.error}</div>` : ''}
                        </div>
                    `;
                    body.appendChild(row);
                });
                block.appendChild(header);
                block.appendChild(body);
                resEl.appendChild(block);
            });
        }

        // Auto-run on load
        document.addEventListener('DOMContentLoaded', () => {
            // unit.test.js already executed via <script> tag above,
            // but we need to re-run with our overridden describe/test.
            // The overrides are in place before unit.test.js loads, so
            // just render the captured results.
            const summary = window.__testSummary ? window.__testSummary() : { pass: 0, fail: 0, total: 0 };
            renderResults(window.__suiteResults || [], summary);
        });
    </script>
</body>
</html>
