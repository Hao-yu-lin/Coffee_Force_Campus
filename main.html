<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Coffee Force Campus - Brewing Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="app-inner">
            <h1>☕ Coffee Force Campus - Brewing Analysis</h1>

            <!-- ── Header ── -->
            <div class="header-panel">
                <div class="header-grid">
                    <div class="header-item">
                        <label>咖啡名稱:</label>
                        <input type="text" id="coffeeName" placeholder="輸入咖啡名稱">
                    </div>
                    <div class="header-item">
                        <label>沖煮目標:</label>
                        <input type="text" id="brewingTarget" placeholder="輸入沖煮目標">
                    </div>
                    <div class="header-item">
                        <label>記錄時間:</label>
                        <input type="text" id="recordTime" readonly>
                    </div>
                </div>
                <div class="header-buttons">
                    <button class="btn btn-load">📂 讀取歷史檔</button>
                    <button class="btn btn-save">💾 完成並儲存同步</button>
                </div>
            </div>

            <!-- ── Desktop Tabs ── -->
            <div class="tabs-desktop">
                <button class="tab-btn active" data-tab="brewing">☕ 沖煮紀錄</button>
                <button class="tab-btn" data-tab="descriptive">📝 CVA Descriptive</button>
                <button class="tab-btn" data-tab="affective">⭐ CVA Affective</button>
            </div>

            <!-- ── Tab 1: Brewing (shell — content loaded from tabs/tab-brewing.html) ── -->
            <div id="tab-brewing" class="tab-content active"></div>

            <!-- ── Tab 2: CVA Descriptive (shell — content loaded from tabs/tab-descriptive.html) ── -->
            <div id="tab-descriptive" class="tab-content"></div>

            <!-- ── Tab 3: CVA Affective (shell — content loaded from tabs/tab-affective.html) ── -->
            <div id="tab-affective" class="tab-content"></div>

        </div><!-- /app-inner -->
    </div><!-- /app-container -->

    <!-- ── Mobile Bottom Navigation ── -->
    <nav class="tabs-mobile">
        <div class="tabs-mobile-inner">
            <button class="tab-mobile-btn active" id="mbtn-brewing" data-tab="brewing">
                <span class="icon">☕</span>沖煮紀錄
            </button>
            <button class="tab-mobile-btn" id="mbtn-descriptive" data-tab="descriptive">
                <span class="icon">📝</span>Descriptive
            </button>
            <button class="tab-mobile-btn" id="mbtn-affective" data-tab="affective">
                <span class="icon">⭐</span>Affective
            </button>
        </div>
    </nav>

    <!-- Hidden file inputs (mobile-accessible) -->
    <input type="file" id="fileInputMobile" accept=".csv" style="display:none;" multiple>
    <input type="file" id="folderInputMobile" webkitdirectory accept=".csv" style="display:none;" multiple>

    <!-- ── Scripts ── -->
    <script src="js/constants.js"></script>
    <script src="js/utils.js"></script>
    <script type="module" src="js/controller/appController.js"></script>
</body>
</html>
